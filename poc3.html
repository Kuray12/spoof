<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fake Address Bar + Scroll + Keyboard Safe</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
  }

  button {
    margin: 12px;
    padding: 12px 16px;
    font-size: 16px;
  }

  .hint {
    text-align: center;
    color: #666;
    padding: 10px;
  }

  .spacer {
    height: 900px;
  }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  /* 🔻 Fake bar */
  .fake-bar {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;

    background: #fff7f0;
    border-top: 1px solid #e0cbb0;
    text-align: center;
    font-size: 15px;
    padding: 12px;

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, transform 0.2s ease;

    z-index: 9999;
  }

  .fake-bar.show {
    opacity: 1;
    visibility: visible;
  }
</style>
</head>

<body>

<button id="scrollBtn">Scroll ke Input</button>

<div class="hint">
  Scroll dulu, baru ketemu input
</div>

<div class="spacer"></div>

<textarea id="ta" placeholder="Mulai ngetik di sini..."></textarea>

<div class="spacer"></div>

<div class="fake-bar" id="fakeBar">https://google.com/search</div>

<script>
const fakeBar = document.getElementById("fakeBar");
const ta = document.getElementById("ta");
const scrollBtn = document.getElementById("scrollBtn");

let keyboardOffset = 0;

/* =========================
   SHOW / HIDE BAR
========================= */
function showBar() {
  fakeBar.classList.add("show");
}

function hideBar() {
  fakeBar.classList.remove("show");
}

/* =========================
   KEYBOARD DETECTION (IMPORTANT)
========================= */
function updateKeyboard() {
  if (!window.visualViewport) return;

  const vv = window.visualViewport;

  keyboardOffset = window.innerHeight - vv.height - vv.offsetTop;

  if (keyboardOffset < 0) keyboardOffset = 0;

  fakeBar.style.transform = `translateY(-${keyboardOffset}px)`;
}

/* =========================
   EVENTS FOR INPUT
========================= */
ta.addEventListener("focus", showBar);
ta.addEventListener("click", showBar);
ta.addEventListener("input", showBar);
ta.addEventListener("blur", hideBar);

/* =========================
   SCROLL BUTTON
========================= */
scrollBtn.addEventListener("click", () => {
  window.scrollTo({
    top: ta.offsetTop - 100,
    behavior: "smooth"
  });

  setTimeout(() => {
    ta.focus();
    showBar();
  }, 500);
});

/* =========================
   KEYBOARD LISTENER
========================= */
if (window.visualViewport) {
  visualViewport.addEventListener("resize", updateKeyboard);
  visualViewport.addEventListener("scroll", updateKeyboard);
}

window.addEventListener("resize", updateKeyboard);

updateKeyboard();
</script>

</body>
</html>
