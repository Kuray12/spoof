<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fake Bar Above Keyboard</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    padding-bottom: 120px;
  }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  .spacer { height: 800px; }

  /* 🔻 Fake bar */
  .fake-bar {
    position: fixed;
    left: 0;
    width: 100%;
    bottom: 0;

    background: #fff7f0;
    border-top: 1px solid #e0cbb0;
    text-align: center;
    font-size: 15px;
    padding: 12px;

    opacity: 0;
    visibility: hidden;
    transition: all 0.2s ease;

    z-index: 9999;
  }

  .fake-bar.show {
    opacity: 1;
    visibility: visible;
  }
</style>
</head>

<body>

<textarea id="ta" placeholder="Tap here..."></textarea>

<div class="spacer"></div>

<div class="fake-bar" id="fakeBar">https://google.com/search</div>

<script>
const fakeBar = document.getElementById("fakeBar");
const ta = document.getElementById("ta");

let keyboardHeight = 0;

/* =========================
   SHOW / HIDE
========================= */
function showBar() {
  fakeBar.classList.add("show");
}

function hideBar() {
  fakeBar.classList.remove("show");
}

/* =========================
   KEYBOARD DETECTION (IMPORTANT)
========================= */
function updateKeyboard() {
  if (!window.visualViewport) return;

  const vv = window.visualViewport;

  // tinggi keyboard = selisih viewport
  keyboardHeight = window.innerHeight - vv.height - vv.offsetTop;

  if (keyboardHeight < 0) keyboardHeight = 0;

  // geser bar ke atas keyboard
  fakeBar.style.transform = `translateY(-${keyboardHeight}px)`;
}

/* =========================
   EVENTS
========================= */
ta.addEventListener("focus", showBar);
ta.addEventListener("click", showBar);
ta.addEventListener("input", showBar);

ta.addEventListener("blur", hideBar);

/* =========================
   LISTEN KEYBOARD RESIZE
========================= */
if (window.visualViewport) {
  visualViewport.addEventListener("resize", updateKeyboard);
  visualViewport.addEventListener("scroll", updateKeyboard);
}

/* fallback */
window.addEventListener("resize", updateKeyboard);

/* init */
updateKeyboard();
</script>

</body>
</html>
