<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perfect Fake Bar</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
  }

  .spacer { height: 900px; }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  /* 🔻 FIXED BAR */
  .fake-bar {
    position: fixed;
    left: 0;
    width: 100%;

    bottom: 0; /* will be overridden by JS */

    background: #fff7f0;
    border-top: 1px solid #e0cbb0;
    text-align: center;
    font-size: 15px;
    padding: 12px;

    z-index: 9999;

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.15s ease;
  }

  .fake-bar.show {
    opacity: 1;
    visibility: visible;
  }
</style>
</head>

<body>

<div class="spacer"></div>

<textarea id="ta" placeholder="Type here..."></textarea>

<div class="spacer"></div>

<div class="fake-bar" id="fakeBar">https://google.com/search</div>

<script>
const fakeBar = document.getElementById("fakeBar");
const ta = document.getElementById("ta");

let keyboardHeight = 0;

/* =========================
   SHOW / HIDE
========================= */
function showBar() {
  fakeBar.classList.add("show");
}

function hideBar() {
  fakeBar.classList.remove("show");
}

/* =========================
   PERFECT KEYBOARD FIT
========================= */
function updateKeyboard() {
  if (!window.visualViewport) return;

  const vv = window.visualViewport;

  // REAL keyboard height calculation
  keyboardHeight = window.innerHeight - vv.height - vv.offsetTop;

  if (keyboardHeight < 0) keyboardHeight = 0;

  // 🔥 INSTEAD OF transform → use bottom positioning
  fakeBar.style.bottom = keyboardHeight + "px";
}

/* =========================
   EVENTS
========================= */
ta.addEventListener("focus", showBar);
ta.addEventListener("click", showBar);
ta.addEventListener("input", showBar);
ta.addEventListener("blur", hideBar);

/* =========================
   KEYBOARD TRACKING
========================= */
if (window.visualViewport) {
  visualViewport.addEventListener("resize", updateKeyboard);
  visualViewport.addEventListener("scroll", updateKeyboard);
}

window.addEventListener("resize", updateKeyboard);

updateKeyboard();
</script>

</body>
</html>
