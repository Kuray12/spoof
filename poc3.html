<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultra Fixed Fake Bar</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
  }

  .spacer { height: 900px; }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  /* 🔻 WRAPPER (fixed full width) */
  .bar-wrap {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    z-index: 9999;

    transform: translateY(100%);
    transition: transform 0.15s ease;
  }

  .bar-wrap.show {
    transform: translateY(0);
  }

  /* 🔻 actual bar */
  .fake-bar {
    background: #fff7f0;
    border-top: 1px solid #e0cbb0;
    text-align: center;
    font-size: 15px;
    padding: 12px;
  }
</style>
</head>

<body>

<div class="spacer"></div>

<textarea id="ta" placeholder="Type here..."></textarea>

<div class="spacer"></div>

<div class="bar-wrap" id="barWrap">
  <div class="fake-bar">https://google.com/search</div>
</div>

<script>
const barWrap = document.getElementById("barWrap");
const ta = document.getElementById("ta");

let lastKeyboard = 0;

/* =========================
   SHOW / HIDE
========================= */
function showBar() {
  barWrap.classList.add("show");
}

function hideBar() {
  barWrap.classList.remove("show");
}

/* =========================
   PERFECT KEYBOARD DETECT
   (NO GAP METHOD)
========================= */
function updateKeyboard() {
  if (!window.visualViewport) return;

  const vv = window.visualViewport;

  // 🔥 REAL visible bottom gap
  const bottomGap = window.innerHeight - vv.height - vv.offsetTop;

  // instead of bottom positioning → move wrapper UP
  barWrap.style.transform = `
    translateY(calc(${bottomGap}px))
  `;
}

/* =========================
   EVENTS
========================= */
ta.addEventListener("focus", showBar);
ta.addEventListener("click", showBar);
ta.addEventListener("input", showBar);
ta.addEventListener("blur", hideBar);

/* =========================
   TRACK KEYBOARD LIVE
========================= */
if (window.visualViewport) {
  visualViewport.addEventListener("resize", updateKeyboard);
  visualViewport.addEventListener("scroll", updateKeyboard);
}

window.addEventListener("resize", updateKeyboard);

updateKeyboard();
</script>

</body>
</html>
