<!DOCTYPE html>
<html>
<head>
  <title>Address Bar Visibility Test</title>
  <style>
    body {
      margin: 0;
      height: 200vh; /* biar bisa scroll */
      font-family: Arial;
    }

    .top-banner {
      position: fixed;
      top: 0;
      width: 100%;
      background: red;
      color: white;
      text-align: center;
      padding: 10px;
      z-index: 9999;
    }

    .content {
      margin-top: 60px;
      text-align: center;
    }

    button {
      padding: 15px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="top-banner">Address Bar Visibility Test</div>

<div class="content">
  <h2>Scroll & Observe Address Bar</h2>
  <button onclick="openTest()">Open New Page</button>
</div>

<script>
function openTest() {
  var w = window.open("about:blank", "_blank");

  setTimeout(() => {
    w.document.write(`
      <html>
      <head>
        <style>
          body {
            margin:0;
            height:200vh;
            font-family: Arial;
          }

          .fake-header {
            position: fixed;
            top: 0;
            width: 100%;
            background: black;
            color: white;
            text-align: center;
            padding: 12px;
            z-index: 9999;
          }

          .box {
            margin-top: 80px;
            height: 1500px;
            background: linear-gradient(white, gray);
          }

          button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 12px;
          }
        </style>
      </head>

      <body>

        <div class="fake-header">Test Header (Observe URL Bar)</div>

        <div class="box"></div>

        <button onclick="window.scrollTo(0,1000)">
          Scroll Down
        </button>

      </body>
      </html>
    `);
  }, 500);
}
</script>

</body>
</html>
