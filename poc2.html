<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scroll Fullscreen Simulation</title>

<style>
  body { margin: 0; font-family: sans-serif; }

  button {
    padding: 12px 18px;
    font-size: 16px;
    margin: 10px;
  }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 10px;
    margin-top: 20px;
    box-sizing: border-box;
  }

  .fake-bar {
    text-align: center;
    background: #fff7f0;
    border-top: 1px solid #e0cbb0;
    border-bottom: 1px solid #e0cbb0;
    color: #222;
    font-size: 16px;
    padding: 5px 0;
    position: fixed;
    width: 100%;
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, bottom 0.2s ease;
  }

  .fake-bar.show {
    opacity: 1;
    visibility: visible;
  }

  .spacer { height: 900px; }

</style>
</head>

<body>

<button id="showBtn">Show Keyboard</button>

<textarea id="ta" placeholder="Textarea at top…"></textarea>

<div class="fake-bar" id="fakeBar">google.com</div>

<div class="spacer"></div>

<textarea id="middleTa" placeholder="Textarea in middle…"></textarea>

<script>
const fakeBar = document.getElementById('fakeBar');
const ta = document.getElementById('ta');
const middleTa = document.getElementById('middleTa');

/* detect Opera Mini */
const isOperaMini =
  Object.prototype.toString.call(window.operamini) === "[object OperaMini]" ||
  navigator.userAgent.includes("Opera Mini");

/* adjust fake bar */
function adjustFakeBar() {
  if (isOperaMini) {
    fakeBar.style.bottom = "0px";
    return;
  }

  const vv = window.visualViewport;
  if (!vv) return;

  const keyboardHeight = window.innerHeight - vv.height - vv.offsetTop;
  fakeBar.style.bottom = keyboardHeight + "px";
}

/* show / hide */
function showFakeBar() {
  fakeBar.classList.add("show");
  adjustFakeBar();
}

function hideFakeBar() {
  fakeBar.classList.remove("show");
}

/* 🎯 main behavior (scroll-based) */
document.getElementById("showBtn").onclick = () => {

  if (isOperaMini) {
    // fallback sederhana
    ta.focus();
    showFakeBar();
    return;
  }

  // scroll untuk “hide URL bar”
  window.scrollTo({
    top: 600,
    behavior: "smooth"
  });

  // setelah scroll, fokus
  setTimeout(() => {
    ta.focus();
    showFakeBar();
  }, 300);
};

/* focus events */
ta.addEventListener("focus", showFakeBar);
middleTa.addEventListener("focus", showFakeBar);

ta.addEventListener("blur", hideFakeBar);
middleTa.addEventListener("blur", hideFakeBar);

/* viewport resize */
if (!isOperaMini && window.visualViewport) {
  window.visualViewport.addEventListener("resize", () => {
    if (
      document.activeElement === ta ||
      document.activeElement === middleTa
    ) {
      adjustFakeBar();
    }
  });
}

/* orientation */
window.addEventListener("orientationchange", adjustFakeBar);
</script>

</body>
</html>
