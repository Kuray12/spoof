<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Filename Spoof Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #111;
      color: #eee;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h2>Unicode BiDi Filename Demo</h2>

  <p>
    Demo karakter <code>U+202E</code> (Right-To-Left Override)
    untuk riset UI spoofing.
  </p>

  <button id="downloadBtn">
    Download Demo File
  </button>

  <script>
    function downloadSpoofFile() {

      // Sample harmless content
      const content = "Educational filename spoofing demo.";

      const blob = new Blob(
        [content],
        { type: "application/octet-stream" }
      );

      const url = URL.createObjectURL(blob);

      // Unicode Right-To-Left Override
      const rlo = "\u202E";

      /*
        Raw filename:
        report‮gpj.exe

        Bisa terlihat misleading pada UI tertentu
      */
      const fakeName = "report" + rlo + "gpj.exe";

      const a = document.createElement("a");

      a.href = url;
      a.download = fakeName;

      document.body.appendChild(a);

      a.click();

      document.body.removeChild(a);

      URL.revokeObjectURL(url);

      console.log("Raw filename:", fakeName);
    }

    document
      .getElementById("downloadBtn")
      .addEventListener("click", downloadSpoofFile);
  </script>

</body>
</html>
