<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chromium Download Classification Test</title>

  <style>
    body{
      background:#121212;
      color:#eee;
      font-family:Arial;
      padding:40px;
    }

    .box{
      max-width:700px;
      background:#1e1e1e;
      padding:20px;
      border-radius:10px;
    }

    button{
      padding:12px 18px;
      margin-top:10px;
      cursor:pointer;
      font-size:15px;
    }

    code{
      background:#333;
      padding:2px 6px;
      border-radius:4px;
    }
  </style>
</head>
<body>

<div class="box">

<h2>Download Classification Research</h2>

<p>
Testing how Chromium handles mismatch between:
</p>

<ul>
  <li>MIME type</li>
  <li>file extension</li>
  <li>UI icon classification</li>
</ul>

<hr>

<button onclick="test1()">Test 1: Image MIME + EXE extension</button>
<button onclick="test2()">Test 2: Text MIME + PDF extension</button>
<button onclick="test3()">Test 3: Video MIME + SCR extension</button>

</div>

<script>

function download(content, mime, filename){

  const blob = new Blob([content], { type: mime });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = filename;

  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

/*
  CORE TEST CASES
*/

function test1(){

  download(
    "image test content",
    "image/png",
    "profile_picture.png.exe"
  );

}

function test2(){

  download(
    "document test content",
    "text/plain",
    "report.pdf.exe"
  );

}

function test3(){

  download(
    "video test content",
    "video/mp4",
    "holiday_video.scr"
  );

}

</script>

</body>
</html>
