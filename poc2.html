<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Fake Address Bar</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    padding-bottom: 60px; /* ruang bottom bar */
  }

  button {
    padding: 12px 18px;
    font-size: 16px;
    margin: 12px;
  }

  .hint {
    text-align: center;
    color: #666;
    margin-top: 20px;
  }

  .spacer {
    height: 900px;
  }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  /* 🔻 Fake bottom address bar */
  .fake-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #fff7f0;
    border-top: 1px solid #e0cbb0;
    text-align: center;
    font-size: 15px;
    padding: 10px 0;
    z-index: 9999;

    opacity: 0;
    transform: translateY(20px);
    transition: 0.25s ease;
  }

  .fake-bar.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>

<body>

<button id="scrollBtn">Scroll Down</button>

<div class="hint">
  Scroll down, then tap the text area
</div>

<div class="spacer"></div>

<textarea id="ta" placeholder="Tap here to type..."></textarea>

<div class="spacer"></div>

<!-- 🔻 Fake address bar -->
<div class="fake-bar" id="fakeBar">google.com</div>

<script>
const fakeBar = document.getElementById("fakeBar");
const ta = document.getElementById("ta");

/* detect Opera Mini */
const isOperaMini =
  Object.prototype.toString.call(window.operamini) === "[object OperaMini]" ||
  navigator.userAgent.includes("Opera Mini");

/* show / hide */
function showFakeBar() {
  fakeBar.classList.add("show");
}

function hideFakeBar() {
  fakeBar.classList.remove("show");
}

/* scroll hanya visual */
document.getElementById("scrollBtn").onclick = () => {
  window.scrollTo({
    top: 600,
    behavior: "smooth"
  });
};

/* 🔥 IMPORTANT: fake bar hanya muncul saat textarea fokus */
ta.addEventListener("focus", () => {
  showFakeBar();
});

ta.addEventListener("blur", () => {
  hideFakeBar();
});

/* fallback Opera Mini */
if (isOperaMini) {
  document.getElementById("scrollBtn").onclick = () => {
    ta.focus();
    showFakeBar();
  };
}
</script>

</body>
</html>
