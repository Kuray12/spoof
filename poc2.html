<!DOCTYPE html>
<html>
<body style="font-family:Arial;padding:40px">

<h2>Camera Permission Race Test</h2>

<button onclick="startFlow()">Start Test</button>

<script>

function startFlow() {

  console.log("Step 1: user gesture captured");

  // simulate redirect delay
  setTimeout(() => {

    console.log("Step 2: after async delay");

    tryCamera();

  }, 1000);
}

function tryCamera() {

  console.log("Step 3: requesting camera");

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      console.log("Camera granted");
    })
    .catch(err => {
      console.log("Camera blocked:", err);
    });

}

</script>

</body>
</html>
