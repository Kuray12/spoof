<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Realistic Scroll UX Demo</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
  }

  button {
    padding: 12px 18px;
    font-size: 16px;
    margin: 12px;
  }

  .hint {
    text-align: center;
    color: #666;
    margin-top: 20px;
  }

  .spacer {
    height: 900px;
  }

  textarea {
    width: 100%;
    font-size: 18px;
    padding: 12px;
    box-sizing: border-box;
  }

  .fake-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #fff7f0;
    border-bottom: 1px solid #e0cbb0;
    text-align: center;
    font-size: 16px;
    padding: 6px 0;
    z-index: 9999;

    opacity: 0;
    transform: translateY(-10px);
    transition: 0.25s ease;
  }

  .fake-bar.show {
    opacity: 1;
    transform: translateY(0);
  }

  .content {
    padding-top: 60px;
  }
</style>
</head>

<body>

<div class="fake-bar" id="fakeBar">google.com</div>

<div class="content">

  <button id="scrollBtn">Scroll Down</button>

  <div class="hint">
    Scroll or tap to continue…
  </div>

  <div class="spacer"></div>

  <textarea id="ta" placeholder="Tap here to type..."></textarea>

  <div class="spacer"></div>

</div>

<script>
const fakeBar = document.getElementById("fakeBar");
const ta = document.getElementById("ta");

/* detect Opera Mini */
const isOperaMini =
  Object.prototype.toString.call(window.operamini) === "[object OperaMini]" ||
  navigator.userAgent.includes("Opera Mini");

/* show / hide fake bar */
function showFakeBar() {
  fakeBar.classList.add("show");
}

function hideFakeBar() {
  fakeBar.classList.remove("show");
}

/* smooth scroll behavior */
document.getElementById("scrollBtn").onclick = () => {

  window.scrollTo({
    top: 600,
    behavior: "smooth"
  });

  // jangan auto-focus (biar natural)
};

/* show fake bar saat input focus */
ta.addEventListener("focus", showFakeBar);
ta.addEventListener("blur", hideFakeBar);

/* optional: detect scroll interaction */
let lastScroll = 0;

window.addEventListener("scroll", () => {
  const current = window.scrollY;

  // show fake bar saat user sudah “masuk area interaction”
  if (current > 200) {
    showFakeBar();
  }

  lastScroll = current;
});

/* Opera Mini fallback */
if (isOperaMini) {
  document.getElementById("scrollBtn").onclick = () => {
    ta.focus();
    showFakeBar();
  };
}
</script>

</body>
</html>
