<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Icon Mismatch Research Demo</title>

  <style>
    body{
      background:#0f0f0f;
      color:#fff;
      font-family:Arial;
      padding:40px;
    }

    button{
      padding:14px 22px;
      font-size:16px;
      cursor:pointer;
      border:none;
      border-radius:8px;
    }

    .box{
      background:#1b1b1b;
      padding:20px;
      border-radius:10px;
      max-width:700px;
    }

    code{
      background:#222;
      padding:2px 6px;
      border-radius:4px;
    }
  </style>
</head>
<body>

<div class="box">

  <h1>Download UI Research Demo</h1>

  <p>
    Testing:
  </p>

  <ul>
    <li>Filename rendering</li>
    <li>Unicode BiDi handling</li>
    <li>Icon classification</li>
    <li>MIME vs extension mismatch</li>
  </ul>

  <p>
    File content is harmless plain text.
  </p>

  <button id="btn">
    Download Test File
  </button>

</div>

<script>

function runDemo() {

  // harmless content
  const payload =
`This is a harmless research file.

Used for:
- icon rendering tests
- filename spoof tests
- MIME mismatch tests`;

  /*
    MIME intentionally set to image/png
    while filename uses .exe extension
  */
  const blob = new Blob(
    [payload],
    {
      type: "image/png"
    }
  );

  const url = URL.createObjectURL(blob);

  // Unicode RLO
  const rlo = "\u202E";

  /*
    Raw:
    Holiday_Photo_2025‮gnp.exe

    Some buggy UIs may render oddly
  */
  const filename =
    "Holiday_Photo_2025_" +
    rlo +
    "gnp.exe";

  const a = document.createElement("a");

  a.href = url;

  a.download = filename;

  document.body.appendChild(a);

  a.click();

  document.body.removeChild(a);

  URL.revokeObjectURL(url);

  console.log("Downloaded filename:", filename);
}

document
  .getElementById("btn")
  .addEventListener("click", runDemo);

</script>

</body>
</html>
